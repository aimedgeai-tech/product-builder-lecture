<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 저녁 뭐먹지? - 셰프 판다의 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="다크 모드 전환">
        🌓
    </button>
    
    <main>
        <div id="panda-canvas"></div>
        <div class="chef-quote" id="chef-quote">"오늘 저녁 메뉴가 고민이신가요? 제가 도와드릴게요!"</div>
        
        <h1>오늘 저녁 뭐먹지?</h1>
        
        <div class="category-filter" id="category-filter">
            <button class="category-btn active" data-category="all">전체</button>
            <button class="category-btn" data-category="korean">한식</button>
            <button class="category-btn" data-category="chinese">중식</button>
            <button class="category-btn" data-category="japanese">일식</button>
            <button class="category-btn" data-category="western">양식</button>
            <button class="category-btn" data-category="special">기타/간식</button>
        </div>

        <div class="food-display-container">
            <food-display></food-display>
        </div>

        <button id="recommend-btn">메뉴 추천받기 🎲</button>

        <hr class="section-divider">

        <section class="contact-section">
            <h2>🤝 제휴 및 문의</h2>
            <p>판다 셰프와 함께하고 싶은 파트너분들의 연락을 기다립니다!</p>
            <form action="https://formspree.io/f/myknjryr" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함 또는 업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기 ✉️</button>
            </form>
        </section>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
    <script src="main.js" type="module"></script>
</body>
</html>
